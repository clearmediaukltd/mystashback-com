<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 318 82"
     role="img" aria-label="MyStashBack">
  <title>MyStashBack</title>
  <defs>
    <style>
      .msb-text {
        font-family: Inter, 'Helvetica Neue', Arial, sans-serif;
      }
    </style>
    <filter id="msb-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: deep navy rounded square -->
  <rect x="0" y="2" width="78" height="78" rx="13" fill="#0f172a"/>
  <!-- Subtle inner border highlight -->
  <rect x="0" y="2" width="78" height="78" rx="13"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Data layer – bottom (faintest) -->
  <ellipse cx="39" cy="55" rx="18" ry="6"
           fill="none" stroke="#16a34a" stroke-width="2.5"
           opacity="0.42" filter="url(#msb-glow)"/>

  <!-- Data layer – middle -->
  <ellipse cx="39" cy="46" rx="18" ry="6"
           fill="none" stroke="#16a34a" stroke-width="2.5"
           opacity="0.70" filter="url(#msb-glow)"/>

  <!-- Data layer – top (full opacity + subtle fill) -->
  <ellipse cx="39" cy="37" rx="18" ry="6"
           fill="#16a34a" fill-opacity="0.13"
           stroke="#16a34a" stroke-width="2.5"
           filter="url(#msb-glow)"/>

  <!-- Cylinder side walls -->
  <line x1="21" y1="37" x2="21" y2="55"
        stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"
        opacity="0.42" filter="url(#msb-glow)"/>
  <line x1="57" y1="37" x2="57" y2="55"
        stroke="#16a34a" stroke-width="2.5" stroke-linecap="round"
        opacity="0.42" filter="url(#msb-glow)"/>

  <!-- Restore / backup arrow pointing upward -->
  <line x1="39" y1="31" x2="39" y2="20"
        stroke="#16a34a" stroke-width="3" stroke-linecap="round"
        filter="url(#msb-glow)"/>
  <polyline points="33,26 39,20 45,26"
            fill="none" stroke="#16a34a" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#msb-glow)"/>

  <!-- "MY" – small tracking label -->
  <text class="msb-text" x="98" y="30"
        font-size="11" font-weight="400"
        fill="#94a3b8" letter-spacing="4">MY</text>

  <!-- "StashBack" – bold main wordmark -->
  <text class="msb-text" x="96" y="63"
        font-size="34" font-weight="900" letter-spacing="-0.5">
    <tspan fill="#0f172a">Stash</tspan><tspan fill="#16a34a">Back</tspan>
  </text>

</svg>
